services:
  cmnc-postgres:
    image: postgres:18.4-alpine3.23
    container_name: cmnc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CMNC_POSTGRES_USER:-cmnc}
      POSTGRES_PASSWORD: ${CMNC_POSTGRES_PASSWORD:-cmnc_password}
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:${CMNC_POSTGRES_PORT:-5432}:5432"
    volumes:
      - cmnc_postgres_data:/var/lib/postgresql
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - cmnc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  cmnc-rabbitmq:
    image: rabbitmq:4.3.1-management
    container_name: cmnc-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${CMNC_RABBITMQ_USER:-cmnc}
      RABBITMQ_DEFAULT_PASS: ${CMNC_RABBITMQ_PASSWORD:-cmnc_password}
      RABBITMQ_DEFAULT_VHOST: ${CMNC_RABBITMQ_VHOST:-cmnc}
    ports:
      - "127.0.0.1:${CMNC_RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${CMNC_RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - cmnc_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - cmnc-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  cmnc-auth-service:
    build:
      context: ..
      dockerfile: services/cmnc-auth-service/Dockerfile
    container_name: cmnc-auth-service
    restart: unless-stopped
    environment:
      CMNC_AUTH_HOST: 0.0.0.0
      CMNC_AUTH_PORT: 8001
      CMNC_AUTH_DATABASE_URL: postgresql+asyncpg://${CMNC_POSTGRES_USER:-cmnc}:${CMNC_POSTGRES_PASSWORD:-cmnc_password}@cmnc-postgres:5432/${CMNC_AUTH_DB:-cmnc_auth}
      CMNC_AUTH_JWT_SECRET: ${CMNC_AUTH_JWT_SECRET}
      CMNC_AUTH_BOOTSTRAP_SUPERADMIN_USERNAME: ${CMNC_AUTH_BOOTSTRAP_SUPERADMIN_USERNAME:-superadmin}
      CMNC_AUTH_BOOTSTRAP_SUPERADMIN_PASSWORD: ${CMNC_AUTH_BOOTSTRAP_SUPERADMIN_PASSWORD}
      CMNC_AUTH_BOOTSTRAP_SUPERADMIN_DISPLAY_NAME: ${CMNC_AUTH_BOOTSTRAP_SUPERADMIN_DISPLAY_NAME:-Super Administrator}
    expose:
      - "8001"
    depends_on:
      cmnc-postgres:
        condition: service_healthy
    networks:
      - cmnc-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5

  cmnc-classroom-service:
    build:
      context: ..
      dockerfile: services/cmnc-classroom-service/Dockerfile
    container_name: cmnc-classroom-service
    restart: unless-stopped
    environment:
      CMNC_CLASSROOM_HOST: 0.0.0.0
      CMNC_CLASSROOM_PORT: 8002
      CMNC_CLASSROOM_DATABASE_URL: postgresql+asyncpg://${CMNC_POSTGRES_USER:-cmnc}:${CMNC_POSTGRES_PASSWORD:-cmnc_password}@cmnc-postgres:5432/${CMNC_CLASSROOM_DB:-cmnc_classroom}
      CMNC_CLASSROOM_RABBITMQ_URL: amqp://${CMNC_RABBITMQ_USER:-cmnc}:${CMNC_RABBITMQ_PASSWORD:-cmnc_password}@cmnc-rabbitmq:5672/${CMNC_RABBITMQ_VHOST:-cmnc}
      CMNC_CLASSROOM_POLICY_SYNC_COMPLETED_QUEUE: cmnc.classroom.policy_sync_completed
      CMNC_CLASSROOM_POLICY_SYNC_FAILED_QUEUE: cmnc.classroom.policy_sync_failed
      CMNC_CLASSROOM_SEED_DEMO_DATA: "false"
      CMNC_CLASSROOM_DEFAULT_ROUTER_ID: 1
      CMNC_CLASSROOM_MANAGED_ADDRESS_LIST_NAME: ${CMNC_POLICY_SYNC_ADDRESS_LIST_NAME:-cmnc_wan_blocked}
    expose:
      - "8002"
    depends_on:
      cmnc-postgres:
        condition: service_healthy
      cmnc-rabbitmq:
        condition: service_healthy
    networks:
      - cmnc-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5

  cmnc-policy-sync-service:
    build:
      context: ..
      dockerfile: services/cmnc-policy-sync-service/Dockerfile
    container_name: cmnc-policy-sync-service
    restart: unless-stopped
    environment:
      CMNC_POLICY_SYNC_RABBITMQ_URL: amqp://${CMNC_RABBITMQ_USER:-cmnc}:${CMNC_RABBITMQ_PASSWORD:-cmnc_password}@cmnc-rabbitmq:5672/${CMNC_RABBITMQ_VHOST:-cmnc}
      CMNC_POLICY_SYNC_CLASSROOM_SERVICE_URL: http://cmnc-classroom-service:8002
      CMNC_POLICY_SYNC_WAN_POLICY_CHANGED_QUEUE: cmnc.policy_sync.wan_policy_changed
      CMNC_POLICY_SYNC_DEFAULT_ROUTER_ID: 1
      CMNC_POLICY_SYNC_KILL_CONNECTIONS_ON_BLOCK: "true"
      CMNC_POLICY_SYNC_ADDRESS_LIST_NAME: ${CMNC_POLICY_SYNC_ADDRESS_LIST_NAME:-cmnc_wan_blocked}
      CMNC_MIKROTIK_BASE_URL: ${CMNC_MIKROTIK_BASE_URL}
      CMNC_MIKROTIK_USERNAME: ${CMNC_MIKROTIK_USERNAME}
      CMNC_MIKROTIK_PASSWORD: ${CMNC_MIKROTIK_PASSWORD}
      CMNC_MIKROTIK_VERIFY_TLS: ${CMNC_MIKROTIK_VERIFY_TLS:-false}
      CMNC_POLICY_SYNC_HEALTHCHECK_WRITE_PROBE_ENABLED: ${CMNC_POLICY_SYNC_HEALTHCHECK_WRITE_PROBE_ENABLED:-true}
      CMNC_POLICY_SYNC_HEALTHCHECK_ADDRESS_LIST_NAME: ${CMNC_POLICY_SYNC_HEALTHCHECK_ADDRESS_LIST_NAME:-cmnc_healthcheck}
      CMNC_POLICY_SYNC_HEALTHCHECK_ADDRESS: ${CMNC_POLICY_SYNC_HEALTHCHECK_ADDRESS:-198.51.100.254}
      CMNC_POLICY_SYNC_HEALTHCHECK_CONNECTION_SRC_IP: ${CMNC_POLICY_SYNC_HEALTHCHECK_CONNECTION_SRC_IP:-127.0.0.1}
    depends_on:
      cmnc-rabbitmq:
        condition: service_healthy
      cmnc-classroom-service:
        condition: service_healthy
    networks:
      - cmnc-network
    healthcheck:
      test: [ "CMD", "python", "-m", "cmnc_policy_sync_service.healthcheck" ]
      interval: 60s
      timeout: 20s
      retries: 1
      start_period: 20s

  cmnc-inventory-service:
    build:
      context: ..
      dockerfile: services/cmnc-inventory-service/Dockerfile
    container_name: cmnc-inventory-service
    restart: unless-stopped
    environment:
      CMNC_INVENTORY_HOST: 0.0.0.0
      CMNC_INVENTORY_PORT: 8003
      CMNC_INVENTORY_DATABASE_URL: postgresql+asyncpg://${CMNC_POSTGRES_USER:-cmnc}:${CMNC_POSTGRES_PASSWORD:-cmnc_password}@cmnc-postgres:5432/${CMNC_INVENTORY_DB:-cmnc_inventory}
      CMNC_INVENTORY_RABBITMQ_URL: amqp://${CMNC_RABBITMQ_USER:-cmnc}:${CMNC_RABBITMQ_PASSWORD:-cmnc_password}@cmnc-rabbitmq:5672/${CMNC_RABBITMQ_VHOST:-cmnc}
      CMNC_INVENTORY_DHCP_LEASES_OBSERVED_QUEUE: cmnc.inventory.dhcp_leases_observed
    expose:
      - "8003"
    depends_on:
      cmnc-postgres:
        condition: service_healthy
      cmnc-rabbitmq:
        condition: service_healthy
    networks:
      - cmnc-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5

  cmnc-mikrotik-poller-service:
    build:
      context: ..
      dockerfile: services/cmnc-mikrotik-poller-service/Dockerfile
    container_name: cmnc-mikrotik-poller-service
    restart: unless-stopped
    environment:
      CMNC_MIKROTIK_POLLER_RABBITMQ_URL: amqp://${CMNC_RABBITMQ_USER:-cmnc}:${CMNC_RABBITMQ_PASSWORD:-cmnc_password}@cmnc-rabbitmq:5672/${CMNC_RABBITMQ_VHOST:-cmnc}
      CMNC_MIKROTIK_POLLER_ROUTER_ID: 1
      CMNC_MIKROTIK_POLLER_MIKROTIK_BASE_URL: ${CMNC_MIKROTIK_BASE_URL}
      CMNC_MIKROTIK_POLLER_MIKROTIK_USERNAME: ${CMNC_MIKROTIK_USERNAME}
      CMNC_MIKROTIK_POLLER_MIKROTIK_PASSWORD: ${CMNC_MIKROTIK_PASSWORD}
      CMNC_MIKROTIK_POLLER_MIKROTIK_VERIFY_TLS: ${CMNC_MIKROTIK_VERIFY_TLS:-false}
      CMNC_MIKROTIK_POLLER_MIKROTIK_TIMEOUT_SECONDS: 10
      CMNC_MIKROTIK_POLLER_POLL_INTERVAL_SECONDS: 5
      CMNC_MIKROTIK_POLLER_PUBLISH_EMPTY_SNAPSHOTS: "true"
    depends_on:
      cmnc-rabbitmq:
        condition: service_healthy
      cmnc-inventory-service:
        condition: service_healthy
    networks:
      - cmnc-network
    healthcheck:
      test: [ "CMD", "python", "-m", "cmnc_mikrotik_poller_service.healthcheck" ]
      interval: 60s
      timeout: 20s
      retries: 1
      start_period: 20s

  cmnc-maintenance-service:
    build:
      context: ..
      dockerfile: services/cmnc-maintenance-service/Dockerfile
    container_name: cmnc-maintenance-service
    restart: unless-stopped
    environment:
      CMNC_MAINTENANCE_HOST: 0.0.0.0
      CMNC_MAINTENANCE_PORT: 8004
      CMNC_MAINTENANCE_DOCKER_SOCKET_PATH: /var/run/docker.sock
      CMNC_MAINTENANCE_CONTAINER_NAME_PREFIX: ${CMNC_MAINTENANCE_CONTAINER_NAME_PREFIX:-cmnc-}
      CMNC_MAINTENANCE_DOCKER_REQUEST_TIMEOUT_SECONDS: ${CMNC_MAINTENANCE_DOCKER_REQUEST_TIMEOUT_SECONDS:-5}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "8004"
    networks:
      - cmnc-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5

  cmnc-api-gateway:
    build:
      context: ..
      dockerfile: services/cmnc-api-gateway/Dockerfile
    container_name: cmnc-api-gateway
    restart: unless-stopped
    environment:
      CMNC_API_GATEWAY_HOST: 0.0.0.0
      CMNC_API_GATEWAY_PORT: 8000
      CMNC_API_GATEWAY_AUTH_SERVICE_URL: http://cmnc-auth-service:8001
      CMNC_API_GATEWAY_CLASSROOM_SERVICE_URL: http://cmnc-classroom-service:8002
      CMNC_API_GATEWAY_INVENTORY_SERVICE_URL: http://cmnc-inventory-service:8003
      CMNC_API_GATEWAY_MAINTENANCE_SERVICE_URL: http://cmnc-maintenance-service:8004
      CMNC_API_GATEWAY_DEFAULT_ROUTER_ID: 1
    ports:
      - "127.0.0.1:${CMNC_API_GATEWAY_PORT:-8000}:8000"
    volumes:
      - ../.build-info.json:/app/.build-info.json:ro
    depends_on:
      cmnc-auth-service:
        condition: service_healthy
      cmnc-classroom-service:
        condition: service_healthy
      cmnc-inventory-service:
        condition: service_healthy
      cmnc-maintenance-service:
        condition: service_healthy
    networks:
      - cmnc-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5

  cmnc-web:
    build:
      context: ..
      dockerfile: apps/cmnc-web/Dockerfile
      args:
        VITE_API_BASE_URL: ${CMNC_WEB_API_BASE_URL:-}
    container_name: cmnc-web
    restart: unless-stopped
    network_mode: host
    environment:
      CMNC_WEB_PORT: ${CMNC_WEB_PORT:-8080}
      CMNC_API_GATEWAY_PORT: ${CMNC_API_GATEWAY_PORT:-8000}
    depends_on:
      cmnc-api-gateway:
        condition: service_healthy

volumes:
  cmnc_postgres_data:
  cmnc_rabbitmq_data:

networks:
  cmnc-network:
    name: cmnc-network
    driver: bridge
